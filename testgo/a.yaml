# 单个服务配置
#
#

bot:
  loginServerAddr: 123.56.248.169:30101

  # 用户数量
  clients: 1
  # 客户端编号起始ID
  clientOffset: 1

  # 登陆模式：
  authenticationMode: "UsernamePassword"

  # code 测试账号登录密码
  code: 12345678

admin:
  server:
    name: admin # service name
    connectionDependencies: [master]
    activationDependencies:
    masterServiceAddr: 10.1.4.38:29001 # master address
    service:
      - number: 1
        listenAddr: 10.1.4.38 # listen address
        listenPort: 29010 # listen port

  httpServerPort: 18787

  commandTopics:
    # 管理后台向服务器组推送消息的频道名称
    clusterMessageTopic: &clusterMessageTopic cluster-topic-61
    # 客服后台向服务器组推送消息的频道名称
    customerMessageTopic: &customerMessageTopic customer-topic-61

  kafka:
    brokers: [mj-kafka.haochang.me:9092]
    consumer:
      groupId: adminGroup-wl
      topics:
        - *clusterMessageTopic
        - *customerMessageTopic
      # 消费者提交间隔，为0时同步提交
      # 同步性能较低，这里可以重复消费
      commitInterval: 1s
    producer:
      async: true

  security:
    enable: true
    signatureDuration: 2s
    clientID:
    clientSecret:

  settingsPath: /Users/wl/work/pai/maque/mahjong-data

  # 向正式服务器发送同步订单的地址
  officialURL: http://10.0.4.38:18787/services/order

  # 定时任务配置: 秒 | 分 | 时 | 日 | 月 | 周
  timerConfig:
    dailyUpdate: "0 0 5 * * ?"
    dailyDelete: "0 0 4 * * ?"

business:
  server:
    name: business # service name
    connectionDependencies: [master, admin]
    activationDependencies:
    masterServiceAddr: 10.1.4.38:29001 # master address
    service:
      - number: 1
        listenAddr: 10.1.4.38 # listen address
        listenPort: 29005 # listen port

  email:
    host: smtpdm.aliyun.com
    port: 80
    username: no-reply@service.mjking.jp
    password: MIchong123
    from: no-reply@service.mjking.jp

  kafka:
    brokers: [mj-kafka.haochang.me:9092]
    consumer:
      groupId: payGroupWl
      topics: [purchase-validation-response-dev1]
      # 消费者提交间隔，为0时同步提交
      # 同步性能较低，这里可以重复消费
      commitInterval: 1s
    producer:
      async: true

  zinnor:
