        listenAddr: 10.1.4.38 # listen address
        listenPort: 28001 # listen port

  # 定时任务配置: 秒 | 分 | 时 | 日 | 月 | 周
  timerConfig:
    logout: "0 0 5 * * *"

  requireUniqueName: false # 验证角色名字唯一

game:
